<h2>你想融合哪些元素？</h2>
<p class="subtitle">修仙为主，融合其他题材特色</p>

<div class="options">
  <div class="option" data-choice="chinese-myth" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>中西神话融合</h3>
      <p>中国仙侠 + 西方奇幻（希腊、北欧神话元素）</p>
      <p><strong>例如：</strong>仙门 + 骑士团，炼丹术 + 炼金术</p>
    </div>
  </div>

  <div class="option" data-choice="modern" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>现代都市融合</h3>
      <p>传统修仙 + 现代都市生活</p>
      <p><strong>例如：</strong>都市修仙者，网络修仙，灵气复苏的现代城市</p>
    </div>
  </div>

  <div class="option" data-choice="scifi" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>科幻融合</h3>
      <p>仙侠 + 科幻设定（星际、赛博朋克）</p>
      <p><strong>例如：</strong>修仙文明 vs 科技文明，星际修仙宗门</p>
    </div>
  </div>

  <div class="option" data-choice="original" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>完全原创设定</h3>
      <p>不受任何现有题材限制，完全从头设计全新的修仙宇宙</p>
      <p><strong>自由度：</strong>最高，可塑性最强</p>
    </div>
  </div>
</div>
