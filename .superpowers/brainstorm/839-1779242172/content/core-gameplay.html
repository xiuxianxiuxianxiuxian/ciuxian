<h2>核心玩法方向</h2>
<p class="subtitle">多人在线修仙，你最想突出哪种体验？</p>

<div class="options">
  <div class="option" data-choice="social" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>社交休闲为主</h3>
      <p>门派建设、结缘论道、自由交易、炼制丹药法宝，轻松愉快的修仙社交体验</p>
    </div>
  </div>

  <div class="option" data-choice="combat" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>挑战战斗为主</h3>
      <p>组队秘境探险、世界boss战、论道大会PVP、帮派战，体验修仙界的激烈竞争</p>
    </div>
  </div>

  <div class="option" data-choice="explore" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>探索冒险为主</h3>
      <p>广阔的世界地图、上古遗迹探索、隐藏剧情发现、世界事件动态体验</p>
    </div>
  </div>

  <div class="option" data-choice="balanced" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>均衡混合型</h3>
      <p>社交、战斗、探索都有一定深度，适合不同类型玩家</p>
    </div>
  </div>
</div>
