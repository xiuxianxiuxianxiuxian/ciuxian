<h2>游戏的美术视觉风格</h2>
<p class="subtitle">选择游戏的整体视觉呈现方式</p>

<div class="options">
  <div class="option" data-choice="anime" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>二次元动漫风</h3>
      <p>日系动漫画风，角色立绘精美，场景唯美，适合年轻玩家群体</p>
      <p><strong>特点：</strong>华丽的技能特效，萌系角色，丰富的表情系统</p>
    </div>
  </div>

  <div class="option" data-choice="realistic" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>写实古风</h3>
      <p>传统中国古典美学，水墨风格，山水场景，仙气飘飘</p>
      <p><strong>特点：</strong>水墨渲染效果，古典建筑，淡雅配色</p>
    </div>
  </div>

  <div class="option" data-choice="cartoon" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>Q版可爱风</h3>
      <p>卡通风格，小巧可爱的角色模型，轻松休闲的氛围</p>
      <p><strong>特点：</strong>萌趣角色，简洁UI，易上手</p>
    </div>
  </div>

  <div class="option" data-choice="dark" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>暗黑奇幻风</h3>
      <p>暗色调，神秘氛围，强调修仙的艰辛和代价</p>
      <p><strong>特点：</strong>深邃场景，神秘氛围，有深度的剧情</p>
    </div>
  </div>
</div>
