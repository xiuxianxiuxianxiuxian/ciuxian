<h2>修仙世界的设定风格</h2>
<p class="subtitle">你想打造什么样的修仙世界观？</p>

<div class="options">
  <div class="option" data-choice="xianxia" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>仙侠古典风</h3>
      <p>传统中国神话，御剑飞行、丹药筑基、渡劫飞升，元婴化神体系，门派争斗</p>
      <p><strong>关键词：</strong>蜀山、少林、昆仑、飞剑、法宝</p>
    </div>
  </div>

  <div class="option" data-choice="xuanhuan" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>玄幻异界风</h3>
      <p>现代都市修仙或异界重生，系统面板、灵气复苏、星际修仙，科技与修仙融合</p>
      <p><strong>关键词：</strong>系统、穿越、都市、灵气复苏</p>
    </div>
  </div>

  <div class="option" data-choice="wuxia" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>武侠江湖风</h3>
      <p>低武境界，内力真气、江湖恩怨、门派秘籍、江湖纷争，更注重武侠元素</p>
      <p><strong>关键词：</strong>华山论剑、江湖恩怨、武功秘籍</p>
    </div>
  </div>

  <div class="option" data-choice="fusion" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>融合创新风</h3>
      <p>融合多种风格，创造独特的修仙宇宙，有自己的法则和设定</p>
      <p><strong>关键词：</strong>原创、独特、融合</p>
    </div>
  </div>
</div>
