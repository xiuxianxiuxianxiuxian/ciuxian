<h2>修炼体系设计</h2>
<p class="subtitle">修仙游戏的核心系统 - 决定玩家的成长方式</p>

<div class="options">
  <div class="option" data-choice="classic" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>传统境界体系</h3>
      <p>练气 → 筑基 → 金丹 → 元婴 → 化神 → 大乘 → 渡劫 → 飞升</p>
      <p><strong>特点：</strong>经典修仙设定，玩家耳熟能详，易于理解</p>
    </div>
  </div>

  <div class="option" data-choice="element" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>元素法则体系</h3>
      <p>以五行/元素为核心：金木水火土 + 阴阳 → 领悟法则 → 证道</p>
      <p><strong>特点：</strong>强调属性相生相克，策略性更强</p>
    </div>
  </div>

  <div class="option" data-choice="path" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>道法传承体系</h3>
      <p>多条修炼道路：剑道、丹道、器道、阵道、魂道等，专精发展</p>
      <p><strong>特点：</strong>职业分化明确，各有特色，选择多样化</p>
    </div>
  </div>

  <div class="option" data-choice="fusion-system" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>融合创新体系</h3>
      <p>完全原创的修炼体系，有独特的规则和设定</p>
      <p><strong>特点：</strong>根据你的创意完全定制</p>
    </div>
  </div>
</div>
